WDSP
{
    switchTimeDecayWear = true           //When the option is "true", the wear of the solar panels will increase over time, and vice versa. The default value in RO is true.
    switchWeatherAffectWear = true        //When the option is "true", the wear of the solar panels will be increased by the weather, and vice versa

    // Performance tuning (TVC weather sampling)
    weatherRayMarchSteps = 50             // Ray march steps along the sun ray (10-50). Lower = faster, less precise.
    weatherSampleInterval = 1             // Full weather resample every N physics steps (1 = every step).
}
